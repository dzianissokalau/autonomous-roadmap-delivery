name: Release Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifact:
    name: Build Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: python3 -m pip install -e .

      - name: Run release checks
        run: |
          python3 -m unittest discover -s tests -v
          python3 scripts/build_codex_package.py --check
          python3 scripts/check_release_privacy.py --repo-root .
          python3 scripts/build_release.py --check

      - name: Build local release artifacts
        run: python3 scripts/build_release.py --output-dir dist --json

      - name: Upload release-check artifact
        uses: actions/upload-artifact@v4
        with:
          name: roadmap-delivery-release-artifacts
          path: dist/*
